<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CESI · 24h de Stan — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="engine.jsx"></script>
<script type="text/babel" src="dashboard-combo.jsx"></script>

<script type="text/babel">
function Stage({ Component, scale = 1, ...rest }) {
  return (
    <div style={{ width: 1920 * scale, height: 1080 * scale, overflow: 'hidden' }}>
      <div style={{ transform: `scale(${scale})`, transformOrigin: 'top left', width: 1920, height: 1080 }}>
        <Component {...rest} />
      </div>
    </div>
  );
}

function App() {
  const SCALE = 0.5;
  const ABW = 1920 * SCALE;
  const ABH = 1080 * SCALE;
  return (
    <DesignCanvas>
      <DCSection id="final" title="24h de Stan · Dashboard" subtitle="Combined dashboard — F1 chrome + satellite map + telemetry graphs.">
        <DCArtboard id="combo" label="STAN ATTACK · Live dashboard" width={ABW} height={ABH}>
          <Stage Component={ComboDashboard} scale={SCALE} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
